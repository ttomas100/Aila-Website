  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ease-in-out infinite;\">\n  <\u002Fdiv>\n\n  <!-- nav -->\n  <nav style=\"position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 6vw;background:rgba(239,239,239,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(36,38,41,.07);\">\n    <a href=\"../\" style=\"display:flex;align-items:center;gap:9px;text-decoration:none;\">\n      <img src=\"a76daf8f-dab0-405b-bdd9-596b0a27891f\" alt=\"Aila\" style=\"height:36px;width:auto;display:block;\">\n      <span style=\"font-size:21px;font-weight:800;letter-spacing:-.02em;color:#242629;\">Aila<\u002Fspan>\n    <\u002Fa>\n    <a href=\"../\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:15px;font-weight:600;color:#242629;text-decoration:none;\">\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n      Back to home\n    <\u002Fa>\n  <\u002Fnav>\n\n  <!-- content -->\n  <main style=\"position:relative;z-index:2;max-width:840px;margin:0 auto;padding:150px 6vw 100px;\">\n    <div style=\"display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:100px;background:rgba(255,255,255,.65);border:1px solid rgba(36,38,41,.08);font-size:13px;font-weight:600;backdrop-filter:blur(6px);margin-bottom:26px;\">\n      <span style=\"width:7px;height:7px;border-radius:50%;background:#918DE2;\"><\u002Fspan>Legal\n    <\u002Fdiv>\n    <h1 style=\"font-size:clamp(40px,6vw,68px);line-height:1.0;letter-spacing:-.035em;font-weight:800;margin-bottom:14px;\">Privacy Policy<\u002Fh1>\n    <p style=\"font-size:15px;color:#5a5c61;font-weight:600;margin-bottom:40px;\">Last updated: June 21, 2026<\u002Fp>\n\n    <div data-prose=\"\" style=\"background:rgba(255,255,255,.78);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.9);border-radius:24px;padding:clamp(28px,4vw,52px);box-shadow:0 30px 70px -30px rgba(36,38,41,.28);\">\n\n      <p>This Privacy Policy explains how Aila, Inc. (“Aila,” “we,” “us,” or “our”) collects, uses, discloses, and protects your information when you use the Aila platform, including our Experts marketplace, Creators marketplace, AI Agent, and related websites and services (collectively, the “Services”). By using the Services, you agree to the practices described here.<\u002Fp>\n\n      <h2>1. Who we are<\u002Fh2>\n      <p>Aila, Inc. is a Delaware C-Corporation. For any privacy-related questions or requests, contact us at <a href=\"mailto:privacy@aila-io.com\">privacy@aila-io.com<\u002Fa>. For users in the EU/UK, this section also identifies us as the data controller for personal data processed through the Services.<\u002Fp>\n\n      <h2>2. Information we collect<\u002Fh2>\n      <p>We collect the following categories of information:<\u002Fp>\n      <ul>\n        <li><strong>Account information<\u002Fstrong> — name, email address, password, company details, and role (e.g., advertiser, expert, or creator) you provide when you register.<\u002Fli>\n        <li><strong>Profile and marketplace data<\u002Fstrong> — information experts and creators provide to build profiles, including specialties, platforms served, portfolio links, and performance history.<\u002Fli>\n        <li><strong>Connected advertising account data<\u002Fstrong> — when you authorize Aila to connect to your advertising accounts on Meta, Google Ads, TikTok, or Snapchat, we access campaign, ad set, ad, audience, performance, and billing-related data through those platforms’ APIs in order to provide optimization and reporting features. We access only the data permitted by your authorization and the relevant platform’s terms.<\u002Fli>\n        <li><strong>Payment information<\u002Fstrong> — processed by our payment providers (including Stripe). We do not store full card numbers on our own servers.<\u002Fli>\n        <li><strong>AI Agent interactions<\u002Fstrong> — prompts, instructions, and conversations you have with the AI Agent, and the actions it performs on your behalf, including audit logs of those actions.<\u002Fli>\n        <li><strong>Usage and device data<\u002Fstrong> — IP address, browser type, device identifiers, pages viewed, and interactions with the Services, collected through analytics tools and cookies.<\u002Fli>\n        <li><strong>Communications<\u002Fstrong> — messages you send to us or to other users through the Services.<\u002Fli>\n      <\u002Ful>\n\n      <h2>3. How we use your information<\u002Fh2>\n      <ul>\n        <li>To provide, operate, and maintain the Services, including the Experts marketplace, Creators marketplace, and AI Agent.<\u002Fli>\n        <li>To connect to and optimize your advertising accounts and generate reporting, the Aila Score, and campaign insights.<\u002Fli>\n        <li>To match advertisers with experts and creators.<\u002Fli>\n        <li>To process payments and manage subscriptions.<\u002Fli>\n        <li>To communicate with you about your account, updates, and support.<\u002Fli>\n        <li>To monitor, analyze, and improve the Services, including security and fraud prevention.<\u002Fli>\n        <li>To comply with legal obligations.<\u002Fli>\n      <\u002Ful>\n\n      <h2>4. Legal bases for processing (EU/UK users)<\u002Fh2>\n      <p>If you are in the European Economic Area or the United Kingdom, we process your personal data on the following legal bases: performance of a contract (to deliver the Services you request), your consent (for example, certain cookies and marketing), our legitimate interests (such as improving and securing the Services), and compliance with legal obligations.<\u002Fp>\n\n      <h2>5. How we share information<\u002Fh2>\n      <p>We do not sell your personal information. We share information only as follows:<\u002Fp>\n      <ul>\n        <li><strong>Advertising platforms<\u002Fstrong> — with Meta, Google, TikTok, and Snapchat as necessary to manage and optimize the accounts you connect, subject to their terms and policies.<\u002Fli>\n        <li><strong>Service providers<\u002Fstrong> — with vendors that help us operate the Services, such as Stripe (payments), AWS (hosting), and analytics providers, under contractual confidentiality and data-protection obligations.<\u002Fli>\n        <li><strong>Other users<\u002Fstrong> — profile and marketplace information you choose to make available to advertisers, experts, or creators.<\u002Fli>\n        <li><strong>AI processing<\u002Fstrong> — with the AI model providers that power the AI Agent, to process your requests. We do not authorize these providers to use your data to train their models except as permitted by our agreements with them.<\u002Fli>\n        <li><strong>Legal and safety<\u002Fstrong> — when required by law, legal process, or to protect the rights, property, or safety of Aila, our users, or others.<\u002Fli>\n        <li><strong>Business transfers<\u002Fstrong> — in connection with a merger, acquisition, or sale of assets, subject to this Policy.<\u002Fli>\n      <\u002Ful>\n\n      <h2>6. Cookies and analytics<\u002Fh2>\n      <p>We use cookies and similar technologies to operate the Services, remember your preferences, and understand usage. We use analytics tools to measure and improve performance. You can control cookies through your browser settings; disabling some cookies may affect functionality. Where required, we request your consent before setting non-essential cookies.<\u002Fp>\n\n      <h2>7. Data retention<\u002Fh2>\n      <p>We retain personal data for as long as your account is active or as needed to provide the Services, and thereafter as required to comply with legal obligations, resolve disputes, and enforce our agreements. Audit logs of AI Agent actions are retained for security and accountability purposes.<\u002Fp>\n\n      <h2>8. Your rights<\u002Fh2>\n      <p>Depending on your location, you may have the right to access, correct, delete, or port your personal data, to object to or restrict certain processing, and to withdraw consent. To exercise these rights, contact <a href=\"mailto:privacy@aila-io.com\">privacy@aila-io.com<\u002Fa>. We will respond within the timeframes required by applicable law. You also have the right to lodge a complaint with your local data protection authority.<\u002Fp>\n\n      <h3>8.1 EU/UK (GDPR)<\u002Fh3>\n      <p>If you are in the EU/UK, you have the rights described above under the GDPR/UK GDPR. Where we transfer your data outside the EEA or UK, we rely on appropriate safeguards such as Standard Contractual Clauses.<\u002Fp>\n\n      <h3>8.2 California (CCPA/CPRA)<\u002Fh3>\n      <p>If you are a California resident, you have the right to know what personal information we collect, to request its deletion or correction, to opt out of the sale or sharing of personal information, and to not be discriminated against for exercising these rights. We do not sell personal information. To submit a request, contact <a href=\"mailto:privacy@aila-io.com\">privacy@aila-io.com<\u002Fa>. You may use an authorized agent to submit requests on your behalf.<\u002Fp>\n\n      <h2>9. Security<\u002Fh2>\n      <p>We implement technical and organizational measures designed to protect your information, including encryption, access controls, and audit logging. No method of transmission or storage is completely secure, and we cannot guarantee absolute security.<\u002Fp>\n\n      <h2>10. Children’s privacy<\u002Fh2>\n      <p>The Services are not directed to children under 16, and we do not knowingly collect personal data from them. If you believe a child has provided us with personal data, contact us and we will delete it.<\u002Fp>\n\n      <h2>11. International users<\u002Fh2>\n      <p>Aila is operated from the United States. By using the Services, you understand that your information may be processed in the United States and other countries that may have different data protection laws than your jurisdiction.<\u002Fp>\n\n      <h2>12. Changes to this Policy<\u002Fh2>\n      <p>We may update this Privacy Policy from time to time. We will post the updated version with a revised “Last updated” date and, where required, notify you of material changes.<\u002Fp>\n\n      <h2>13. Contact us<\u002Fh2>\n      <p>If you have questions about this Privacy Policy or our data practices, contact us at <a href=\"mailto:privacy@aila-io.com\">privacy@aila-io.com<\u002Fa>.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <div style=\"margin-top:40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\">\n      <a href=\"../\" style=\"display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:13px;background:#918DE2;color:#fff;font-size:15px;font-weight:600;text-decoration:none;box-shadow:0 12px 30px -10px rgba(145,141,226,.7);\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n        Back to home\n      <\u002Fa>\n      <span style=\"font-size:14px;color:#5a5c61;\">© 2026 Aila, Inc.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const root = this.base || document;\n    const prose = root.querySelector ? root.querySelector('[data-prose]') : document.querySelector('[data-prose]');\n    const scope = prose || document;\n    scope.querySelectorAll('h2').forEach(el => {\n      el.style.cssText = 'font-size:22px;font-weight:700;letter-spacing:-.02em;margin:34px 0 12px;color:#242629;';\n    });\n    scope.querySelectorAll('h3').forEach(el => {\n      el.style.cssTe
